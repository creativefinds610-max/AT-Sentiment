async function supa(path, options={}){
  const res=await fetch(`${SUPA_URL}/rest/v1/${path}`,{
    ...options,
    headers:{
      'apikey':SUPA_KEY,
      'Authorization':`Bearer ${SUPA_KEY}`,
      'Content-Type':'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok){const e=await res.text();throw new Error(`DB ${res.status}: ${e}`);}
  const t=await res.text();return t?JSON.parse(t):null;
}

async function initData(){
  // Load rounds from Supabase
  let rows=await supa('rounds?select=*&order=date.asc');

  // First-time setup: seed historical rounds if table is empty
  if(!rows||!rows.length){
    for(const h of HIST){
      await supa('rounds',{method:'POST',headers:{'Prefer':'return=minimal'},
        body:JSON.stringify({id:h.id,name:h.name,short:h.short,date:h.date,status:'closed',is_hist:true,label:h.label||null,q1:h.q1,q2:h.q2,q3:h.q3,count:h.count})});
    }
    rows=await supa('rounds?select=*&order=date.asc');
  }

  // Ensure comment data exists for historical rounds (idempotent)
  const existingCx=await supa('comments_cache?select=round_id');
  const hasCx=new Set((existingCx||[]).map(r=>r.round_id));
  for(const h of HIST){
    if(!hasCx.has(h.id)){
      await supa('comments_cache',{method:'POST',headers:{'Prefer':'return=minimal'},
        body:JSON.stringify({round_id:h.id,data:h.cx})});
    }
  }

  S.rounds=(rows||[]).map(r=>({
    id:r.id,name:r.name,short:r.short,date:r.date,
    status:r.status,isHist:r.is_hist,label:r.label,
    q1:parseFloat(r.q1)||0,q2:parseFloat(r.q2)||0,q3:parseFloat(r.q3)||0,count:r.count||0
  }));
  S.activeRound=S.rounds.find(r=>r.status==='open')||null;
}

async function loadResp(rid){
  const d=await supa(`responses?round_id=eq.${rid}&select=*&order=timestamp.asc`);
  return(d||[]).map(r=>({id:r.id,timestamp:r.timestamp,scores:r.scores,comments:r.comments}));
}

async function saveResp(rid,resp){
  await supa('responses',{method:'POST',headers:{'Prefer':'return=minimal'},
    body:JSON.stringify({id:resp.id,round_id:rid,timestamp:resp.timestamp,scores:resp.scores,comments:resp.comments})});
}

async function submitted(rid,name){
  const h=nh(name,rid);
  const d=await supa(`submissions?round_id=eq.${rid}&hash=eq.${h}&select=hash`);
  return d&&d.length>0;
}

async function addSub(rid,h){
  await supa('submissions',{method:'POST',headers:{'Prefer':'return=minimal'},
    body:JSON.stringify({round_id:rid,hash:h})});
}

async function getMetrics(rid){
  const r=S.rounds.find(x=>x.id===rid);if(!r)return null;
  // Use stored values for historical and closed rounds (fast, no extra DB call)
  if(r.isHist||r.status==='closed'){
    return{q1:r.q1,q2:r.q2,q3:r.q3,comp:+((r.q1+r.q2+r.q3)/3).toFixed(2),n:r.count};
  }
  // For open rounds: compute live from Supabase
  const resp=await loadResp(rid);
  if(!resp.length)return{q1:0,q2:0,q3:0,comp:0,n:0};
  const n=resp.length,
        q1=resp.reduce((s,r)=>s+r.scores.q1,0)/n,
        q2=resp.reduce((s,r)=>s+r.scores.q2,0)/n,
        q3=resp.reduce((s,r)=>s+r.scores.q3,0)/n;
  return{q1:+q1.toFixed(2),q2:+q2.toFixed(2),q3:+q3.toFixed(2),comp:+((q1+q2+q3)/3).toFixed(2),n};
}

function sc(s){if(s>=8)return'var(--aok)';if(s>=6)return'var(--awk)';return'var(--aer)';}
function stag(s){if(s>=8)return['tg-ok','● Strong'];if(s>=6)return['tg-md','● Moderate'];return['tg-lo','● Needs attention'];}
function lsc(s){if(s>=8)return'var(--teal)';if(s>=6)return'var(--gold)';return'var(--coral)';}
function dc(k){if(S.charts[k]){S.charts[k].destroy();delete S.charts[k];}}
function $id(id){return document.getElementById(id);}
function nh(name,rid){let s=name.toLowerCase().trim()+'::'+rid,h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h)^s.charCodeAt(i);h=h|0;}return Math.abs(h).toString(36);}

async function rOverview(tc){
  const rounds=S.rounds,latest=rounds.find(r=>r.status==='open')||rounds[rounds.length-1];
  if(!latest){tc.innerHTML=`<div class="awrap"><div class="empty"><div class="ei">📋</div><div class="et">No data yet</div><div class="es">Create and open a new survey round to get started.</div></div></div>`;return;}
  const m=await getMetrics(latest.id);
  const[tc1,tl1]=stag(m.comp),[tc2,tl2]=stag(m.q1),[tc3,tl3]=stag(m.q2),[tc4,tl4]=stag(m.q3);
  const isOpen=latest.status==='open';
  let prevHtml='';
  if(rounds.length>=2){
    const prev=rounds[rounds.length-2],pm=await getMetrics(prev.id);
    if(pm){const diff=+(m.comp-pm.comp).toFixed(2),sign=diff>=0?'+':'',col=diff>=0?'var(--aok)':'var(--aer)';
      prevHtml=`<div class="acard" style="margin-top:14px;"><div style="font-size:11px;font-weight:600;color:var(--atxt-md);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">vs Previous Round (${prev.name})</div><div style="font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:${col};">${sign}${diff}</div><div style="font-size:13px;color:var(--atxt-md);margin-top:4px;">Composite: ${pm.comp} → ${m.comp}</div></div>`;

  el.style.display='block';
  const r=S.rounds.find(x=>x.id===sid);
  let html='';

    const cx=await loadCxData(sid);

      const qlbls={q4:'Openness',q5:'Key Activities',q6:'Why Valuable',q7:'Improvement Ideas',q8:'Other Thoughts'};
      html=Object.entries(qlbls).map(([q,lbl])=>`<div style="margin-bottom:18px;"><div style="font-weight:700;font-size:13px;color:var(--atxt-md);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">${lbl}</div>${(cx[q]||[]).map(s=>`<div class="resp-card">${s}</div>`).join('')}</div>`).join('');

function pickScore(q,v){
  S.ans[q]=v;
  document.querySelectorAll(`[onclick*="pickScore('${q}'"]`).forEach(b=>{b.classList.toggle('on',parseInt(b.textContent)===v);});
  const done=(S.ans.q1>0?1:0)+(S.ans.q2>0?1:0)+(S.ans.q3>0?1:0);
  const prg=$id('prg');
  if(prg)prg.style.width=Math.min(100,done/3*45+((S.ans.q4||S.ans.q5||S.ans.q6||S.ans.q7||S.ans.q8)?55:0))+'%';
}

async function doName(){
  const ni=$id('ni'),name=(ni?.value||'').trim();
  const errEl=$id('nerr');
  if(!name){if(errEl){errEl.style.display='flex';errEl.textContent='Please enter your first name to continue.';}return;}
  S.name=name;
  if(S.activeRound){
    if(await submitted(S.activeRound.id,name)){
      if(errEl){errEl.style.display='flex';errEl.innerHTML='<span>⚠️</span><span>It looks like you\'ve already submitted a response for this round. Each person can only submit once per survey.</span>';}
      return;
    }
  }
  nav('survey');
}

async function doSubmit(){
  const a=S.ans;
  if(!a.q1||!a.q2||!a.q3){
    const el=$id('serr');
    if(el){el.style.display='flex';el.innerHTML='<span>⚠️</span><span>Please answer all three rating questions (1–10) before submitting.</span>';}
    return;
  }
  const btn=$id('subbtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Submitting…';}
  const resp={id:Math.random().toString(36).slice(2),timestamp:new Date().toISOString(),scores:{q1:a.q1,q2:a.q2,q3:a.q3},comments:{q4:a.q4,q5:a.q5,q6:a.q6,q7:a.q7,q8:a.q8}};
  if(S.activeRound){
    await saveResp(S.activeRound.id,resp);
    await addSub(S.activeRound.id,nh(S.name,S.activeRound.id));
    // Update response count in Supabase
    const idx=S.rounds.findIndex(r=>r.id===S.activeRound.id);
    if(idx>=0){
      S.rounds[idx].count=(S.rounds[idx].count||0)+1;
      await supa(`rounds?id=eq.${S.activeRound.id}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({count:S.rounds[idx].count})});
    }
  }
  S.submitted={q1:a.q1,q2:a.q2,q3:a.q3};
  S.ans={q1:0,q2:0,q3:0,q4:'',q5:'',q6:'',q7:'',q8:''};
  S.name='';
  nav('success');
}

function selCxR(v){S.selCx=v;const tc=$id('tc');if(tc)rComments(tc);}
function selSugR(v){S.selSug=v;const tc=$id('tc');if(tc)rSuggestions(tc);}

async function runCx(sid){
  if(S.analysing)return;
  S.analysing=true;
  const tc=$id('tc');if(tc)await rComments(tc);
  const result=await aiAnalyse(sid);
  S.analysing=false;
  if(result){S.cxCache[sid]=result;await saveAnalysis(sid,result);}
  if(tc)await rComments(tc);
}

async function runSug(sid){
  if(S.suggesting)return;
  if(!S.cxCache[sid]){
    const cached=await loadAnalysis(sid);
    if(cached)S.cxCache[sid]=cached;
    else{await runCx(sid);}
  }
  S.suggesting=true;
  const tc=$id('tc');if(tc)await rSuggestions(tc);
  const result=await aiSuggestions(sid);
  S.suggesting=false;
  if(result){S.sugCache[sid]=result;await saveSuggestions(sid,result);}
  if(tc)await rSuggestions(tc);
}

async function createRound(){
  const name=($id('rname')?.value||'').trim(),date=$id('rdate')?.value||new Date().toISOString().split('T')[0];
  if(!name)return;
  const id=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const short=name.replace(/^(\w{3})\w+\s+(\d{2})(\d{2})$/,'$1 $3')||name.substring(0,8);
  await supa('rounds',{method:'POST',headers:{'Prefer':'return=minimal'},
    body:JSON.stringify({id,name,short,date,status:'open',is_hist:false,count:0})});
  const nr={id,name,short,date,status:'open',isHist:false,count:0};
  S.rounds.push(nr);S.activeRound=nr;
  const tc=$id('tc');if(tc)await rRounds(tc);
}

async function closeRound(rid){
  const resps=await loadResp(rid);
  const updates={status:'closed'};
  if(resps.length){
    const n=resps.length;
    updates.q1=+(resps.reduce((s,r)=>s+r.scores.q1,0)/n).toFixed(2);
    updates.q2=+(resps.reduce((s,r)=>s+r.scores.q2,0)/n).toFixed(2);
    updates.q3=+(resps.reduce((s,r)=>s+r.scores.q3,0)/n).toFixed(2);
    updates.count=n;
  }
  await supa(`rounds?id=eq.${rid}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(updates)});
  const idx=S.rounds.findIndex(r=>r.id===rid);
  if(idx>=0)S.rounds[idx]={...S.rounds[idx],...updates};
  S.activeRound=null;
  const tc=$id('tc');if(tc)await rRounds(tc);
}

async function deleteRound(rid){
  const r=S.rounds.find(x=>x.id===rid);
  if(!r)return;
  if(r.isHist){alert('Historical rounds cannot be deleted.');return;}
  const isOpen=r.status==='open';
  const msg=isOpen
    ?`⚠️ "${r.name}" is currently LIVE.\n\nDeleting it will immediately end the survey and permanently remove all responses and data for this round.\n\nType DELETE to confirm.`
    :`Delete "${r.name}"?\n\nThis will permanently remove the round and all its data. This cannot be undone.\n\nType DELETE to confirm.`;
  const conf=window.prompt(msg);
  if((conf||'').trim().toUpperCase()!=='DELETE')return;
  // ON DELETE CASCADE in Supabase handles responses, submissions, caches
  await supa(`rounds?id=eq.${rid}`,{method:'DELETE'});
  S.rounds=S.rounds.filter(x=>x.id!==rid);
  if(S.activeRound?.id===rid)S.activeRound=null;
  delete S.cxCache[rid];delete S.sugCache[rid];
  const tc=$id('tc');if(tc)await rRounds(tc);
}

/* ────────────────────────────────────────────
   AI CALLS  (WebLLM — runs fully in-browser)
──────────────────────────────────────────── */
let llmEngine=null;

function extractJSON(text){
  try{return JSON.parse(text.trim());}catch(e){}
  try{return JSON.parse(text.replace(/```json\n?|```\n?/g,'').trim());}catch(e){}
  const om=text.match(/\{[\s\S]*\}/);if(om)try{return JSON.parse(om[0]);}catch(e){}
  const am=text.match(/\[[\s\S]*\]/);if(am)try{return JSON.parse(am[0]);}catch(e){}
  return null;
}

async function getEngine(onProgress){
  if(llmEngine)return llmEngine;
  const{CreateMLCEngine}=await import('https://esm.run/@mlc-ai/web-llm');
  llmEngine=await CreateMLCEngine('Phi-3.5-mini-instruct-q4f16_1-MLC',{
    initProgressCallback:(p)=>{if(onProgress)onProgress(p);}
  });
  return llmEngine;
}

function llmProgressHTML(p){
  const pct=Math.round((p.progress||0)*100);
  const isDownloading=(p.text||'').toLowerCase().includes('fetch')||(p.text||'').toLowerCase().includes('download');
  return`<div class="lc" style="padding:36px 20px;text-align:center;">
    <div style="max-width:320px;margin:0 auto;">
      <div style="font-size:32px;margin-bottom:14px;">${isDownloading?'📥':'⚙️'}</div>
      <div style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--atxt);margin-bottom:6px;">${isDownloading?'Downloading AI model…':'Preparing AI model…'}</div>
      <div style="font-size:12px;color:var(--atxt-md);margin-bottom:16px;line-height:1.5;">${isDownloading?'This is a one-time download (~2.4 GB). Once cached, analysis is instant.':'Setting up the model — almost ready…'}</div>
      <div style="background:rgba(255,255,255,.08);border-radius:6px;height:8px;overflow:hidden;width:100%;">
        <div style="background:linear-gradient(90deg,var(--aac),#36C97E);height:100%;border-radius:6px;width:${pct}%;transition:width .4s ease;"></div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--atxt-dm);margin-top:8px;">${pct}%</div>
    </div>
  </div>`;
}

async function aiAnalyse(sid){
  const r=S.rounds.find(x=>x.id===sid);
  let cx;
  if(r&&r.isHist){
    const cxData=await loadCxData(sid);
    if(cxData){cx={q4:cxData.q4.join('\n'),q5:cxData.q5.join('\n'),q6:cxData.q6.join('\n'),q7:cxData.q7.join('\n'),q8:cxData.q8.join('\n')};}
  } else if(r){
    const resps=await loadResp(sid);
    if(!resps.length)return null;
    cx={q4:resps.map(r=>r.comments.q4).filter(Boolean).join('\n'),q5:resps.map(r=>r.comments.q5).filter(Boolean).join('\n'),q6:resps.map(r=>r.comments.q6).filter(Boolean).join('\n'),q7:resps.map(r=>r.comments.q7).filter(Boolean).join('\n'),q8:resps.map(r=>r.comments.q8).filter(Boolean).join('\n')};
  }
  if(!cx)return null;
  const prompt=`You are analysing anonymous team survey responses for a data analytics translation team. Study the responses and return a JSON analysis.

Q4 - Satisfaction with team openness:
${cx.q4||'(none)'}
Q5 - Key activities that build connection:
${cx.q5||'(none)'}
Q6 - Why those activities are valuable:
${cx.q6||'(none)'}
Q7 - Suggestions to improve team bonding:
${cx.q7||'(none)'}
Q8 - Other thoughts:
${cx.q8||'(none)'}

You MUST respond with ONLY a valid JSON object. No prose, no markdown, no explanation before or after. The JSON must follow this exact structure:
{"overallSentiment":"positive","overallSummary":"2-3 sentence summary of overall sentiment.","themes":[{"name":"Theme name","sentiment":"positive","summary":"2-3 sentence description."}]}
Sentiment values must be exactly: positive, neutral, or negative.
Identify exactly 4 to 6 distinct themes.`;
  try{
    const resEl=$id('cxres');
    const engine=await getEngine((p)=>{if(resEl)resEl.innerHTML=llmProgressHTML(p);});
    if(resEl)resEl.innerHTML=`<div class="lc"><div class="spinner"></div><div><strong>Analysing responses…</strong><div style="font-size:12px;margin-top:4px;color:var(--atxt-md);">Running sentiment analysis</div></div></div>`;
    const response=await engine.chat.completions.create({messages:[{role:'user',content:prompt}],max_tokens:1000,temperature:0.3});
    const text=response.choices[0].message.content||'';
    const result=extractJSON(text);
    if(!result)throw new Error('Could not parse JSON from model output');
    return result;
  }catch(e){console.error('Analysis error:',e);return null;}
}

async function aiSuggestions(sid){
  const m=await getMetrics(sid),r=S.rounds.find(x=>x.id===sid);
  const analysis=S.cxCache[sid];
  const themes=analysis?.themes?.map(t=>`- ${t.name} (${t.sentiment}): ${t.summary}`).join('\n')||'No theme data available';
  const prompt=`You are an expert in team dynamics advising the lead of "${APP}", a data analytics translation team. Based on the survey data below, generate 5 actionable recommendations.

Survey results for ${r?.name||'this round'}:
- Q1 Connectedness: ${m.q1}/10
- Q2 Comfort reaching out: ${m.q2}/10
- Q3 Open communication: ${m.q3}/10
- Composite: ${m.comp}/10
- Overall sentiment: ${analysis?.overallSentiment||'unknown'}

Key themes from feedback:
${themes}

You MUST respond with ONLY a valid JSON array. No prose, no markdown, no explanation. The JSON must follow this exact structure:
[{"title":"Short action title","description":"2-3 sentence explanation of what to do and why.","urgency":"immediate","icon":"🎯"}]
The urgency field must be exactly one of: immediate, short-term, or ongoing.
Provide exactly 5 items.`;
  try{
    const resEl=$id('sugres');
    const engine=await getEngine((p)=>{if(resEl)resEl.innerHTML=llmProgressHTML(p);});
    if(resEl)resEl.innerHTML=`<div class="lc"><div class="spinner"></div><div><strong>Generating recommendations…</strong><div style="font-size:12px;margin-top:4px;color:var(--atxt-md);">Analysing scores and themes</div></div></div>`;
    const response=await engine.chat.completions.create({messages:[{role:'user',content:prompt}],max_tokens:1000,temperature:0.3});
    const text=response.choices[0].message.content||'';
    const result=extractJSON(text);
    if(!result)throw new Error('Could not parse JSON from model output');
    return result;
  }catch(e){console.error('Suggestions error:',e);return null;}
}

   INIT
──────────────────────────────────────────── */

  try{
    await initData();
    S.view='landing';
    await render();
  }catch(e){
    console.error('Init error:',e);
    document.getElementById('app').innerHTML=`
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);padding:20px;">
        <div style="text-align:center;max-width:400px;">
          <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
          <h2 style="font-family:'Outfit',sans-serif;color:var(--navy);margin-bottom:8px;">Connection Error</h2>
          <p style="color:var(--txt-md);font-size:14px;line-height:1.65;">Could not connect to the database. Please check your internet connection and try refreshing the page.</p>
          <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Retry</button>
        </div>
      </div>`;
  }
}
init();
